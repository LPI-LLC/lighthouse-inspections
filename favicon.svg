  <circle cx="16" cy="18" r="9.5" fill="#E8922A"/>
  <!-- Light rays -->
  <path d="M18.2,8.5 L22,5.5 L19,10" fill="#F5B840" opacity="0.8"/>
  <path d="M13.8,8.5 L10,5.5 L13,10" fill="#F5B840" opacity="0.8"/>
  <!-- Tower -->
  <path d="M14.5,11 L14,25 H18 L17.5,11 Z" fill="#1A1A1A"/>
  <!-- Lantern room -->
  <rect x="14" y="8.5" width="4" height="2.8" rx="0.5" fill="#FFFDE8" stroke="#1A1A1A" stroke-width="0.5"/>
  <!-- Cupola -->
  <path d="M13.8,8.5 L16,6 L18.2,8.5 Z" fill="#1A1A1A"/>
  <!-- Finial -->
  <line x1="16" y1="6" x2="16" y2="4.5" stroke="#1A1A1A" stroke-width="0.8"/>
  <!-- Gallery -->
  <rect x="13" y="11" width="6" height="1" rx="0.3" fill="#1A1A1A"/>
