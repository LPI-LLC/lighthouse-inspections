  <rect x="15" y="13.5" width="2" height="2" rx="0.3" fill="#F5C542"/>
  <rect x="14.8" y="17.5" width="2.4" height="2" rx="0.3" fill="#F5C542"/>
  <!-- Base -->
  <path d="M13,25 H19 L20.5,27 H11.5 Z" fill="#1A1A1A"/>
  <path d="M10,27 Q13,26 16,27 Q19,26 22,27 L21,28 H11 Z" fill="#2C3E5A"/>
  <!-- Birds -->
  <path d="M7,14 Q8.2,12.8 9.4,14" stroke="#1A1A1A" stroke-width="0.6" fill="none" stroke-linecap="round"/>
  <path d="M22,12 Q23.2,10.8 24.4,12" stroke="#1A1A1A" stroke-width="0.6" fill="none" stroke-linecap="round"/>
</svg>
