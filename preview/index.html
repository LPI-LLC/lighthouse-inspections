<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Lighthouse Property Inspections</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0D1B2A;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .gate {
      text-align: center;
      max-width: 360px;
      padding: 40px;
    }
    .gate h1 {
      font-size: 1.4rem;
      margin-bottom: 8px;
    }
    .gate p {
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .gate input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(27, 42, 74, 0.6);
      color: #fff;
      font-size: 1rem;
      outline: none;
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: 0.1em;
    }
    .gate input:focus { border-color: #D4A847; }
    .gate button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #D4A847, #B8912E);
      color: #0D1B2A;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }
    .gate button:hover { opacity: 0.9; }
    .error {
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }
    .remember {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      user-select: none;
    }
    .remember input {
      width: auto;
      margin: 0;
      padding: 0;
      accent-color: #D4A847;
    }
    iframe {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      display: none;
    }
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <h1>Site Preview</h1>
    <p>Enter the password to view the redesign.</p>
    <form onsubmit="return checkPass()">
      <input type="password" id="pw" placeholder="Password" autofocus>
      <label class="remember"><input type="checkbox" id="remember" checked> Remember me</label>
      <button type="submit">View Preview</button>
    </form>
    <p class="error" id="err">Wrong password. Try again.</p>
  </div>
  <iframe id="frame"></iframe>
  <script>
    // Simple hash check — not cryptographic security, just a gate
    var HASH = -452556480;
    var STORAGE_KEY = 'lpi-preview-auth';

    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return hash;
    }

    function unlock() {
      document.getElementById('gate').style.display = 'none';
      var f = document.getElementById('frame');
      f.style.display = 'block';
      f.src = 'index-inner.html';
    }

    function checkPass() {
      var pw = document.getElementById('pw').value;
      if (simpleHash(pw) === HASH) {
        if (document.getElementById('remember').checked) {
          try { localStorage.setItem(STORAGE_KEY, '1'); } catch(e) {}
        }
        unlock();
      } else {
        document.getElementById('err').style.display = 'block';
      }
      return false;
    }

    // Auto-unlock if remembered
    try {
      if (localStorage.getItem(STORAGE_KEY) === '1') unlock();
    } catch(e) {}
  </script>
</body>
</html>
